services:
  adult-media-manager:
    image: aiulian25/adult-media-manager:latest
    container_name: adult-media-manager
    ports:
      - "${AMM_PORT:-8887}:${AMM_PORT:-8887}"
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - UMASK=${UMASK:-002}
      # API keys — optional here; add them via the ⚙ Settings page in the UI instead.
      # Keys set here always take priority over the Settings page.
      - TPDB_API_KEY=${TPDB_API_KEY:-}
      - STASHDB_API_KEY=${STASHDB_API_KEY:-}
      - AMM_HOST=0.0.0.0
      - AMM_PORT=${AMM_PORT:-8887}
      - DATA_DIR=/data
      # Date matching tolerance in days (see .env.example). Forwarded explicitly
      # so Docker matches deb/AppImage, which read it straight from the env.
      - AMM_DATE_TOLERANCE_DAYS=${AMM_DATE_TOLERANCE_DAYS:-7}
      # Extra browsable/scannable roots (colon-separated), for media mounted
      # OUTSIDE the built-in roots (/media /mnt /data /downloads /organized /home
      # /srv /nas /storage /run/media). The Browse picker lists the directories
      # you actually mount here (below) that fall within an allowed root; set this
      # to also permit mounts outside them. Example: AMM_EXTRA_ROOTS=/library:/tank
      - AMM_EXTRA_ROOTS=${AMM_EXTRA_ROOTS:-}
      # Run a SINGLE worker only. Match sessions and embed-job progress live in
      # process-local memory, so matching and embed progress break with >1
      # worker. Do not set WEB_CONCURRENCY / AMM_WORKERS above 1.
    volumes:
      # Persistent data: history, settings, API keys saved via UI, embed staging
      - adult-media-manager-data:/data

      # ── Media directories ──────────────────────────────────────────────────
      # Mount your media directories here. Use the same path inside and outside
      # the container so the scan path you type in the UI matches what the
      # server sees. Add as many mounts as you need.
      #
      # Mount under a built-in root (e.g. /mnt, /media, /srv, /nas) and the mount
      # shows up automatically in the in-app Browse picker — only your mounts are
      # listed, not the empty built-in roots. For any other location, also list it
      # in AMM_EXTRA_ROOTS above so the picker/scan will allow it.

      # Single directory:
      # - /path/to/your/media:/path/to/your/media

      # Multiple directories:
      # - /mnt/nas/adult:/mnt/nas/adult
      # - /home/user/Downloads:/home/user/Downloads

      # Network mount (NFS/SMB):
      # - /mnt/nas:/mnt/nas:rw
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  adult-media-manager-data:
    driver: local
